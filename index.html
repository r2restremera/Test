<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Snake</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>Classic Snake</h1>
      <div class="hud" aria-live="polite">
        <p>Score: <span id="score">0</span></p>
        <p>Best: <span id="best">0</span></p>
      </div>
      <canvas
        id="game"
        width="400"
        height="400"
        role="img"
        aria-label="Snake game board"
      ></canvas>
      <p id="status">Press Space to start</p>
      <p class="help">Controls: Arrow/WASD · Swipe on board (mobile) · Tap = start/pause · R = restart</p>
      <p class="help">Controls: Arrow keys / WASD · Space = pause · R = restart</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
